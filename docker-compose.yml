services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cinevault}
      MYSQL_USER: ${MYSQL_USER:-cinevault}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-app-password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./cinevault-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-cinevault}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-cinevault}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-change-app-password}
      CINEVAULT_JWT_SECRET: ${CINEVAULT_JWT_SECRET:-change-this-jwt-secret-before-production}
      CINEVAULT_CORS_ALLOWED_ORIGINS: ${CINEVAULT_CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:5173}
    ports:
      - "8082:8082"

  frontend:
    build:
      context: ./cinevault-frontend
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
