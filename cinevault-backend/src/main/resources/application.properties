server.port=${PORT:8082}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cinevault}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

cinevault.jwt.secret=${CINEVAULT_JWT_SECRET:CineVault$SecretKey#2024@HackathonProjectByTeam!SuperSecure256BitKey}
cinevault.jwt.expiration-ms=86400000

cinevault.cors.allowed-origins=${CINEVAULT_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

logging.level.com.cinevault=DEBUG
